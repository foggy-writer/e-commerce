<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Ecommerce App</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #f4f6f8;
			--paper: #ffffff;
			--ink: #1b2530;
			--muted: #5a6877;
			--accent: #0f766e;
			--accent-soft: #ccfbf1;
			--line: #e5ebf0;
			--ring: 0 12px 28px rgba(27, 37, 48, 0.12);
			--hero: linear-gradient(130deg, #0f766e 0%, #115e59 45%, #0b3e3a 100%);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Manrope", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 12% 8%, rgba(20, 184, 166, 0.18) 0%, transparent 30%),
				radial-gradient(circle at 85% 92%, rgba(15, 118, 110, 0.16) 0%, transparent 35%),
				var(--bg);
			padding: 20px;
			padding-bottom: 110px;
		}

		.app-shell {
			width: min(1320px, 100%);
			margin: 0 auto;
		}

		.topbar {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			background: var(--hero);
			color: #fff;
			border-radius: 18px;
			padding: 18px;
			box-shadow: var(--ring);
		}

		.brand {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.logo-square {
			width: 44px;
			height: 44px;
			border-radius: 10px;
			border: 2px solid rgba(255, 255, 255, 0.4);
			flex: 0 0 auto;
			object-fit: cover;
		}

		.brand h1 {
			font-size: clamp(20px, 2.8vw, 28px);
			letter-spacing: -0.02em;
		}

		.brand p {
			margin-top: 2px;
			color: rgba(255, 255, 255, 0.9);
			font-size: 13px;
		}

		.filter-group {
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 260px;
		}

		.filter-wrap {
			display: flex;
			align-items: center;
			gap: 12px;
			flex-wrap: wrap;
		}

		.filter-group label {
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: rgba(255, 255, 255, 0.86);
			white-space: nowrap;
		}

		.category-select {
			width: 100%;
			font: inherit;
			border: 1px solid rgba(255, 255, 255, 0.45);
			color: #fff;
			background: rgba(255, 255, 255, 0.16);
			border-radius: 10px;
			padding: 10px 12px;
			outline: none;
		}

		.category-select option {
			color: #1b2530;
			background: #fff;
		}

		.location-group {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.location-group label {
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: rgba(255, 255, 255, 0.86);
			white-space: nowrap;
		}

		.location-select {
			font: inherit;
			border: 1px solid rgba(255, 255, 255, 0.45);
			color: #fff;
			background: rgba(255, 255, 255, 0.16);
			border-radius: 10px;
			padding: 10px 12px;
			outline: none;
			min-width: 180px;
		}

		.location-select option {
			color: #1b2530;
			background: #fff;
		}

		.content {
			margin-top: 16px;
			background: var(--paper);
			border: 1px solid var(--line);
			border-radius: 18px;
			padding: 18px;
			box-shadow: var(--ring);
		}

		.meta-row {
			display: flex;
			justify-content: space-between;
			gap: 10px;
			align-items: center;
			margin-bottom: 14px;
			flex-wrap: wrap;
		}

		.meta-row h2 {
			font-size: clamp(20px, 2.2vw, 26px);
			letter-spacing: -0.02em;
		}

		.muted {
			color: var(--muted);
			font-size: 14px;
		}

		.status {
			min-height: 22px;
			margin-bottom: 12px;
			font-size: 14px;
			color: #b91c1c;
		}

		.products-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
			gap: 14px;
			align-items: start;
		}

		.card {
			border: 1px solid var(--line);
			border-radius: 14px;
			overflow: hidden;
			background: #fff;
			display: flex;
			flex-direction: column;
			min-height: 100%;
		}

		.thumb {
			width: 100%;
			aspect-ratio: 4 / 3;
			background: linear-gradient(130deg, #dbeafe 0%, #f0f9ff 100%);
			object-fit: cover;
		}

		.card-body {
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 7px;
		}

		.name {
			font-size: 16px;
			font-weight: 800;
			letter-spacing: -0.01em;
			line-height: 1.25;
		}

		.chips {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
		}

		.chip {
			font-size: 12px;
			padding: 4px 8px;
			border-radius: 999px;
			border: 1px solid #d9e7e6;
			background: #f5fbfa;
			color: #25514e;
			white-space: nowrap;
		}

		.price-row {
			display: flex;
			align-items: baseline;
			gap: 10px;
			margin-top: 2px;
		}

		.our-price {
			font-size: 19px;
			font-weight: 800;
			color: #0f766e;
		}

		.mrp {
			font-size: 13px;
			color: var(--muted);
			text-decoration: line-through;
		}

		.desc {
			margin-top: 2px;
			font-size: 13px;
			line-height: 1.45;
			color: #475569;
			display: -webkit-box;
			-webkit-line-clamp: 3;
			line-clamp: 3;
			-webkit-box-orient: vertical;
			overflow: hidden;
			min-height: 3.95em;
		}

		.empty {
			text-align: center;
			color: var(--muted);
			border: 1px dashed #cdd7e1;
			border-radius: 12px;
			padding: 28px;
			font-size: 14px;
			background: #fbfdff;
		}

		.counter-row {
			margin-top: auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			padding-top: 8px;
		}

		.counter-label {
			font-size: 12px;
			font-weight: 700;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		.counter-box {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 5px;
			border-radius: 999px;
			border: 1px solid #cfe4e2;
			background: #f2fbfa;
		}

		.counter-btn {
			width: 28px;
			height: 28px;
			border: none;
			border-radius: 999px;
			font: inherit;
			font-weight: 800;
			font-size: 16px;
			line-height: 1;
			cursor: pointer;
			background: #0f766e;
			color: #fff;
		}

		.counter-btn:disabled {
			opacity: 0.35;
			cursor: not-allowed;
		}

		.counter-value {
			min-width: 24px;
			text-align: center;
			font-size: 15px;
			font-weight: 800;
			color: #0f766e;
		}

		.cart-footer {
			position: fixed;
			left: 0;
			right: 0;
			bottom: 0;
			padding: 12px 18px;
			background: rgba(11, 62, 58, 0.92);
			backdrop-filter: blur(6px);
			z-index: 50;
		}

		.cart-footer-inner {
			width: min(1320px, 100%);
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			color: #e6fffb;
		}

		.cart-meta {
			font-size: 14px;
		}

		.cart-meta strong {
			font-size: 16px;
			letter-spacing: -0.01em;
		}

		.view-cart-btn {
			border: none;
			background: #14b8a6;
			color: #083a36;
			font: inherit;
			font-weight: 800;
			padding: 10px 16px;
			border-radius: 10px;
			cursor: pointer;
		}

		.view-cart-btn:disabled {
			opacity: 0.45;
			cursor: not-allowed;
		}

		.cart-modal {
			position: fixed;
			inset: 0;
			background: rgba(15, 23, 42, 0.55);
			display: none;
			align-items: center;
			justify-content: center;
			padding: 14px;
			z-index: 60;
		}

		.cart-modal.open {
			display: flex;
		}

		.cart-panel {
			width: min(720px, 100%);
			max-height: 88vh;
			overflow: auto;
			background: #fff;
			border-radius: 16px;
			border: 1px solid var(--line);
			box-shadow: var(--ring);
		}

		.cart-head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			padding: 14px 16px;
			border-bottom: 1px solid var(--line);
		}

		.cart-head h3 {
			font-size: 20px;
			letter-spacing: -0.02em;
		}

		.close-cart-btn {
			border: none;
			width: 34px;
			height: 34px;
			border-radius: 999px;
			background: #edf2f7;
			font-size: 20px;
			line-height: 1;
			cursor: pointer;
		}

		.cart-body {
			padding: 12px 16px;
		}

		.cart-item {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 6px 10px;
			padding: 10px 0;
			border-bottom: 1px solid #eef2f7;
		}

		.cart-item-name {
			font-weight: 700;
		}

		.cart-item-sub {
			color: var(--muted);
			font-size: 13px;
		}

		.cart-item-price {
			font-weight: 800;
			color: #0f766e;
		}

		.cart-footer-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			padding: 14px 16px;
		}

		.cart-total {
			font-size: 18px;
			font-weight: 800;
		}

		.cart-section {
			padding: 0 16px 16px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.payable-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 10px 12px;
			border: 1px solid #d5ece9;
			border-radius: 10px;
			background: #f4fbfa;
		}

		.payable-row span {
			color: #335c58;
			font-weight: 600;
		}

		.payable-row strong {
			font-size: 18px;
			color: #0f766e;
		}

		.slot-options {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
		}

		.slot-option {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 10px;
			border: 1px solid #dde6ef;
			border-radius: 10px;
			font-size: 14px;
		}

		.checkout-form {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
		}

		.form-field {
			display: flex;
			flex-direction: column;
			gap: 5px;
		}

		.form-field label {
			font-size: 12px;
			font-weight: 700;
			color: #4b5563;
			letter-spacing: 0.03em;
			text-transform: uppercase;
		}

		.form-field input {
			width: 100%;
			padding: 9px 10px;
			border: 1px solid #d7dee8;
			border-radius: 8px;
			font: inherit;
			outline: none;
		}

		.form-field input:focus {
			border-color: #0f766e;
		}

		.checkout-actions {
			display: flex;
			align-items: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		.secondary-btn,
		.confirm-order-btn {
			border: none;
			font: inherit;
			font-weight: 700;
			padding: 10px 14px;
			border-radius: 9px;
			cursor: pointer;
		}

		.secondary-btn {
			background: #e8eef5;
			color: #334155;
		}

		.confirm-order-btn {
			background: #0f766e;
			color: #fff;
		}

		.checkout-status {
			min-height: 20px;
			font-size: 13px;
		}

		.checkout-status.error {
			color: #b91c1c;
		}

		.checkout-status.success {
			color: #166534;
		}

		@media (max-width: 700px) {
			body {
				padding: 12px;
				padding-bottom: calc(180px + env(safe-area-inset-bottom, 0px));
			}

			.topbar {
				padding: 14px;
			}

			.filter-group {
				min-width: 100%;
			}

			.content {
				padding: 14px;
			}

			.cart-footer {
				padding: 10px 12px;
			}

			.cart-footer-inner {
				flex-wrap: wrap;
			}

			.view-cart-btn {
				width: 100%;
			}

			.slot-options,
			.checkout-form {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="app-shell">
		<header class="topbar">
			<div class="brand">
				<img src="./icon.png" alt="Fresh Cart Logo" class="logo-square" />
				<div>
					<h1>Fresh Cart</h1>
					<p>Grocery Delivery in Peelamedu, Gandhi Maa Nagar, and surroundings.</p>
				</div>
			</div>

			<div class="location-group">
				<label for="locationFilter">Location</label>
				<select id="locationFilter" class="location-select">
					<option value="">Select Location</option>
				</select>
			</div>

			<div class="filter-group">
				<div class="filter-wrap">
					<div class="filter-group">
						<label for="categoryFilter">Category</label>
						<select id="categoryFilter" class="category-select">
							<option value="all">All Categories</option>
						</select>
					</div>
					<div class="filter-group">
						<label for="subcategoryFilter">Subcategory</label>
						<select id="subcategoryFilter" class="category-select" disabled>
							<option value="all">All Subcategories</option>
						</select>
					</div>
				</div>
			</div>
		</header>

		<main class="content">
			<div class="meta-row">
				<h2>Products</h2>
				<p class="muted" id="countLabel">0 items</p>
			</div>
			<div class="status" id="status"></div>
			<section id="productsGrid" class="products-grid" aria-live="polite"></section>
		</main>
	</div>

	<div class="cart-footer">
		<div class="cart-footer-inner">
			<div class="cart-meta">
				<strong id="cartItemsText">0 items in cart</strong><br />
				<span id="cartTotalText">Total: INR 0.00</span><br />
				<span id="deliveryChargesText" style="font-size: 12px; color: rgba(255, 255, 255, 0.8);">Delivery: INR 0.00</span>
			</div>
			<button id="viewCartBtn" class="view-cart-btn" type="button" disabled>View Cart</button>
		</div>
	</div>

	<div class="cart-modal" id="cartModal" aria-hidden="true">
		<div class="cart-panel" role="dialog" aria-modal="true" aria-labelledby="cartModalTitle">
			<div class="cart-head">
				<h3 id="cartModalTitle">Your Cart</h3>
				<button class="close-cart-btn" id="closeCartBtn" type="button" aria-label="Close cart">&times;</button>
			</div>
			<div class="cart-body" id="cartBody"></div>
			<div class="cart-section">
				<div id="deliveryChargesRow" style="display:none;padding: 10px 12px; border: 1px solid #d5ece9; border-radius: 10px; background: #f4fbfa; margin-bottom: 10px;">
					<div style="display: flex; justify-content: space-between; align-items: center;">
						<span style="color: #335c58; font-weight: 600;">Delivery Charges</span>
						<strong style="font-size: 16px; color: #0f766e;" id="deliveryChargesDetailText">INR 0.00</strong>
					</div>
				</div>
				<div class="payable-row">
					<span>Total Payable</span>
					<strong id="cartPayableText">INR 0.00</strong>
				</div>

				<div class="slot-options">
					<label class="slot-option">
						<input type="radio" name="deliverySlot" value="Morning 10AM" checked />
						<span>Morning 10AM</span>
					</label>
					<label class="slot-option">
						<input type="radio" name="deliverySlot" value="Evening 5PM" />
						<span>Evening 5PM</span>
					</label>
				</div>

				<div class="checkout-form">
					<div class="form-field">
						<label for="customerName">Customer Name</label>
						<input id="customerName" type="text" placeholder="Enter customer name" />
					</div>
					<div class="form-field">
						<label for="customerMobile">Mobile</label>
						<input id="customerMobile" type="tel" placeholder="Enter mobile number" />
					</div>
				</div>

				<div class="checkout-actions">
					<button class="confirm-order-btn" id="confirmOrderBtn" type="button">Confirm Order</button>
				</div>
				<div class="muted">Orders are saved to JSONBin.io (ecommerce-orders).</div>
				<div class="checkout-status" id="checkoutStatus"></div>
			</div>
			<div class="cart-footer-row">
				<div class="muted" id="cartSummaryText">0 items</div>
				<div class="cart-total" id="cartGrandTotal">INR 0.00</div>
			</div>
		</div>
	</div>

	<script>
		const locationFilter = document.getElementById("locationFilter");
		const categoryFilter = document.getElementById("categoryFilter");
		const subcategoryFilter = document.getElementById("subcategoryFilter");
		const productsGrid = document.getElementById("productsGrid");
		const countLabel = document.getElementById("countLabel");
		const status = document.getElementById("status");
		const viewCartBtn = document.getElementById("viewCartBtn");
		const cartItemsText = document.getElementById("cartItemsText");
		const cartTotalText = document.getElementById("cartTotalText");
		const cartModal = document.getElementById("cartModal");
		const closeCartBtn = document.getElementById("closeCartBtn");
		const cartBody = document.getElementById("cartBody");
		const cartSummaryText = document.getElementById("cartSummaryText");
		const cartGrandTotal = document.getElementById("cartGrandTotal");
		const cartPayableText = document.getElementById("cartPayableText");
		const customerNameInput = document.getElementById("customerName");
		const customerMobileInput = document.getElementById("customerMobile");
		const confirmOrderBtn = document.getElementById("confirmOrderBtn");
		const checkoutStatus = document.getElementById("checkoutStatus");
		const deliveryChargesText = document.getElementById("deliveryChargesText");
		const deliveryChargesRow = document.getElementById("deliveryChargesRow");
		const deliveryChargesDetailText = document.getElementById("deliveryChargesDetailText");

		let categories = [];
		let products = [];
		let locations = [];
		let selectedLocation = null;
		let deliveryCharges = 0;
		const cartQuantities = {};

		const JSONBIN_CONFIG = {
			baseUrl: "https://api.jsonbin.io/v3/b",
			masterKey: "$2a$10$VB72m.swb1ZpCn0GgqagMeGGlGlOfBSlg/WoXNCDFpgyn9vjtKHWa",
			accessKey: "$2a$10$kwCHKVbITVHkFQDO1L.rieeHeBFqMoaQwZWdxu9RG.bilKuW2xp2G",
			fixedBinId: "69ca5b9d856a682189e0a139"
		};

		function formatCurrency(value) {
			const amount = Number(value) || 0;
			return new Intl.NumberFormat("en-IN", {
				style: "currency",
				currency: "INR",
				maximumFractionDigits: 2
			}).format(amount);
		}

		function getImageSrc(item) {
			const first = Array.isArray(item.images) && item.images.length ? item.images[0] : item.image;
			if (!first) {
				return "";
			}
			const src = String(first);
			if (src.startsWith("http://") || src.startsWith("https://")) {
				return src;
			}
			return `../admin/${src.replace(/^\/+/, "")}`;
		}

		function getUnitLabel(item) {
			const qty = Number(item.quantityMl);
			const wt = Number(item.weightGms);
			if (Number.isFinite(qty) && qty > 0) {
				return `${qty} ml`;
			}
			if (Number.isFinite(wt) && wt > 0) {
				return `${wt} gms`;
			}
			return "No unit";
		}

		function renderProducts(list) {
			productsGrid.innerHTML = "";
			countLabel.textContent = `${list.length} item${list.length === 1 ? "" : "s"}`;

			if (!list.length) {
				productsGrid.innerHTML = '<div class="empty">No products found for this category.</div>';
				return;
			}

			list.forEach((item) => {
				const card = document.createElement("article");
				card.className = "card";
				const imageSrc = getImageSrc(item);
				const fallbackText = encodeURIComponent(item.name || "Product");
				const safeImage = imageSrc || `https://placehold.co/800x600/e2e8f0/334155?text=${fallbackText}`;
				const quantity = Number(cartQuantities[item.id] || 0);

				card.innerHTML = `
					<img class="thumb" src="${safeImage}" alt="${item.name || "Product"}" loading="lazy" />
					<div class="card-body">
						<h3 class="name">${item.name || "Unnamed Product"}</h3>
						<div class="chips">
							<span class="chip">${item.category || "Uncategorized"}</span>
							<span class="chip">${item.subcategory || "General"}</span>
							<span class="chip">${getUnitLabel(item)}</span>
							<span class="chip">Stock: ${Number(item.stock) || 0}</span>
						</div>
						<div class="price-row">
							<span class="our-price">${formatCurrency(item.ourPrice)}</span>
							<span class="mrp">${formatCurrency(item.mrp)}</span>
						</div>
						<p class="desc">${item.description || "No description available."}</p>
						<div class="counter-row">
							<span class="counter-label">Qty</span>
							<div class="counter-box">
								<button class="counter-btn js-decrease" data-id="${item.id}" type="button" ${quantity === 0 ? "disabled" : ""}>-</button>
								<span class="counter-value">${quantity}</span>
								<button class="counter-btn js-increase" data-id="${item.id}" type="button">+</button>
							</div>
						</div>
					</div>
				`;

				productsGrid.appendChild(card);
			});

			productsGrid.querySelectorAll(".js-increase").forEach((btn) => {
				btn.addEventListener("click", () => {
					const id = btn.dataset.id;
					cartQuantities[id] = Number(cartQuantities[id] || 0) + 1;
					refreshCartUi();
					filterAndRender();
				});
			});

			productsGrid.querySelectorAll(".js-decrease").forEach((btn) => {
				btn.addEventListener("click", () => {
					const id = btn.dataset.id;
					const next = Math.max(0, Number(cartQuantities[id] || 0) - 1);
					if (next === 0) {
						delete cartQuantities[id];
					} else {
						cartQuantities[id] = next;
					}
					refreshCartUi();
					filterAndRender();
				});
			});
		}

		function getCartRows() {
			return Object.entries(cartQuantities)
				.map(([productId, quantity]) => {
					const item = products.find((p) => p.id === productId);
					if (!item || quantity <= 0) {
						return null;
					}
					return { item, quantity };
				})
				.filter(Boolean);
		}

		function setCheckoutStatus(type, message) {
			checkoutStatus.className = `checkout-status ${type || ""}`;
			checkoutStatus.textContent = message || "";
		}

		function getCartTotals() {
			const rows = getCartRows();
			const totalItems = rows.reduce((sum, row) => sum + row.quantity, 0);
			const totalAmount = rows.reduce((sum, row) => sum + (Number(row.item.ourPrice) || 0) * row.quantity, 0);
			const totalPayable = totalAmount + deliveryCharges;
			return { rows, totalItems, totalAmount, totalPayable };
		}

		function refreshCartUi() {
			const { rows, totalItems, totalAmount, totalPayable } = getCartTotals();

			cartItemsText.textContent = `${totalItems} item${totalItems === 1 ? "" : "s"} in cart`;
			cartTotalText.textContent = `Total: ${formatCurrency(totalAmount)}`;
			deliveryChargesText.textContent = `Delivery: ${formatCurrency(deliveryCharges)}`;
			viewCartBtn.disabled = totalItems === 0;
			cartSummaryText.textContent = `${totalItems} item${totalItems === 1 ? "" : "s"}`;
			cartGrandTotal.textContent = formatCurrency(totalPayable);
			
			if (deliveryCharges > 0) {
				deliveryChargesRow.style.display = "block";
				deliveryChargesDetailText.textContent = formatCurrency(deliveryCharges);
				cartPayableText.textContent = formatCurrency(totalPayable);
			} else {
				deliveryChargesRow.style.display = "none";
				cartPayableText.textContent = formatCurrency(totalAmount);
			}

			if (!rows.length) {
				cartBody.innerHTML = '<div class="empty">Your cart is empty.</div>';
				return;
			}

			cartBody.innerHTML = rows.map(({ item, quantity }) => {
				const lineTotal = (Number(item.ourPrice) || 0) * quantity;
				return `
					<div class="cart-item">
						<div>
							<div class="cart-item-name">${item.name || "Unnamed Product"}</div>
							<div class="cart-item-sub">Qty: ${quantity} x ${formatCurrency(item.ourPrice)}</div>
						</div>
						<div class="cart-item-price">${formatCurrency(lineTotal)}</div>
					</div>
				`;
			}).join("");
		}

		function openCartModal() {
			refreshCartUi();
			cartModal.classList.add("open");
			cartModal.setAttribute("aria-hidden", "false");
		}

		function closeCartModal() {
			cartModal.classList.remove("open");
			cartModal.setAttribute("aria-hidden", "true");
			setCheckoutStatus("", "");
		}

		const JSONBIN_BIN_ID = "69cb7cffaaba882197adb454";
		const JSONBIN_MASTER_KEY = "$2a$10$VB72m.swb1ZpCn0GgqagMeGGlGlOfBSlg/WoXNCDFpgyn9vjtKHWa";
		const JSONBIN_ACCESS_KEY = "$2a$10$kwCHKVbITVHkFQDO1L.rieeHeBFqMoaQwZWdxu9RG.bilKuW2xp2G";

		async function appendOrderToJsonBin(order) {
			const getResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
				headers: {
					"X-Master-Key": JSONBIN_MASTER_KEY,
					"X-Access-Key": JSONBIN_ACCESS_KEY
				}
			});

			if (!getResponse.ok) {
				throw new Error("Failed to fetch existing orders from JSONBin.");
			}

			const data = await getResponse.json();
			const existingOrders = Array.isArray(data.record) ? data.record : [];
			const updatedOrders = [order, ...existingOrders];

			const putResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
				method: "PUT",
				headers: {
					"Content-Type": "application/json",
					"X-Master-Key": JSONBIN_MASTER_KEY,
					"X-Access-Key": JSONBIN_ACCESS_KEY
				},
				body: JSON.stringify(updatedOrders)
			});

			if (!putResponse.ok) {
				throw new Error("Failed to save order to JSONBin.");
			}
		}

		async function confirmOrder() {
			const { rows, totalItems, totalAmount, totalPayable } = getCartTotals();
			if (!rows.length) {
				setCheckoutStatus("error", "Cart is empty. Add at least one item.");
				return;
			}

			if (!selectedLocation) {
				setCheckoutStatus("error", "Please select a delivery location.");
				return;
			}

			const customerName = customerNameInput.value.trim();
			const customerMobile = customerMobileInput.value.trim();
			const selectedSlot = document.querySelector('input[name="deliverySlot"]:checked');

			if (!customerName) {
				setCheckoutStatus("error", "Please enter customer name.");
				return;
			}

			if (!/^\d{10}$/.test(customerMobile)) {
				setCheckoutStatus("error", "Mobile must be a 10-digit number.");
				return;
			}

			if (!selectedSlot) {
				setCheckoutStatus("error", "Please select a delivery slot.");
				return;
			}

			const order = {
				status: "new",
				orderId: `ORD-${Date.now()}`,
				createdAt: new Date().toISOString(),
				customerName,
				mobile: customerMobile,
				deliverySlot: selectedSlot.value,
				deliveryLocation: selectedLocation.name,
				deliveryCharges: deliveryCharges,
				totalPayable: totalPayable,
				totalItems,
				items: rows.map(({ item, quantity }) => ({
					id: item.id,
					name: item.name,
					category: item.category,
					subcategory: item.subcategory,
					unit: getUnitLabel(item),
					quantityMl: Number(item.quantityMl) > 0 ? Number(item.quantityMl) : null,
					weightGms: Number(item.weightGms) > 0 ? Number(item.weightGms) : null,
					quantity,
					price: Number(item.ourPrice) || 0,
					lineTotal: (Number(item.ourPrice) || 0) * quantity
				}))
			};

			confirmOrderBtn.disabled = true;
			confirmOrderBtn.textContent = "Saving…";
			try {
				await appendOrderToJsonBin(order);
				setCheckoutStatus("success", "Order confirmed and saved to ecommerce-orders.");
				Object.keys(cartQuantities).forEach((key) => delete cartQuantities[key]);
				refreshCartUi();
				filterAndRender();
				customerNameInput.value = "";
				customerMobileInput.value = "";
			} catch {
				setCheckoutStatus("error", "Could not save order. Please check your connection and try again.");
			} finally {
				confirmOrderBtn.disabled = false;
				confirmOrderBtn.textContent = "Confirm Order";
			}
		}

		function filterAndRender() {
			const selectedCategory = categoryFilter.value;
			const selectedSubcategory = subcategoryFilter.value;

			let filtered = selectedCategory === "all"
				? [...products]
				: products.filter((p) => (p.categoryId || "") === selectedCategory);

			if (selectedSubcategory !== "all") {
				filtered = filtered.filter((p) => {
					const byId = (p.subcategoryId || "") === selectedSubcategory;
					const byName = (p.subcategory || "") === selectedSubcategory;
					return byId || byName;
				});
			}

			renderProducts(filtered);
		}

		function populateCategoryFilter() {
			categoryFilter.innerHTML = '<option value="all">All Categories</option>';
			categories.forEach((cat) => {
				const option = document.createElement("option");
				option.value = cat.id;
				option.textContent = cat.name;
				categoryFilter.appendChild(option);
			});
		}

		function normalizeSubcategories(rawSubcategories) {
			return (Array.isArray(rawSubcategories) ? rawSubcategories : [])
				.map((subcat, index) => {
					if (typeof subcat === "string") {
						const name = subcat.trim();
						return name ? { id: name, name } : null;
					}

					if (subcat && typeof subcat === "object") {
						const name = String(subcat.name || subcat.title || "").trim();
						const id = String(subcat.id || `sub_${index + 1}`).trim();
						return name ? { id, name } : null;
					}

					return null;
				})
				.filter(Boolean);
		}

		function populateSubcategoryFilter(categoryId) {
			subcategoryFilter.innerHTML = '<option value="all">All Subcategories</option>';

			if (categoryId === "all") {
				subcategoryFilter.disabled = true;
				return;
			}

			const selectedCategory = categories.find((cat) => cat.id === categoryId);
			const subcategories = normalizeSubcategories(selectedCategory && selectedCategory.subcategories);

			subcategories.forEach((subcat) => {
				const option = document.createElement("option");
				option.value = subcat.id;
				option.textContent = subcat.name;
				subcategoryFilter.appendChild(option);
			});

			subcategoryFilter.disabled = subcategories.length === 0;
		}

		async function loadLocations() {
			try {
				const response = await fetch("../admin/delivery.json", { cache: "no-store" });
				if (!response.ok) {
					throw new Error("Failed to load delivery.json");
				}
				const data = await response.json();
				locations = Array.isArray(data) ? data : (data.locations || []);

				// Populate location selector
				locationFilter.innerHTML = '<option value="">Select Location</option>';
				locations.forEach((location) => {
					const option = document.createElement("option");
					const areaName = location.area || location.name;
					const charges = location.delivery_charges || location.deliveryCharges;
					option.value = areaName;
					option.textContent = `${areaName} - ₹${charges}`;
					locationFilter.appendChild(option);
				});

				// Set default location to Gandhi Maa Nagar
				const defaultLocation = locations.find((loc) => (loc.area || loc.name) === "Gandhi Maa Nagar");
				if (defaultLocation) {
					selectedLocation = defaultLocation;
					deliveryCharges = Number(defaultLocation.delivery_charges || defaultLocation.deliveryCharges) || 0;
					locationFilter.value = defaultLocation.area || defaultLocation.name;
					refreshCartUi();
				}
			} catch (error) {
				console.error("Error loading locations:", error);
			}
		}

		locationFilter.addEventListener("change", () => {
			const selectedArea = locationFilter.value;
			const location = locations.find((loc) => (loc.area || loc.name) === selectedArea);
			if (location) {
				selectedLocation = location;
				deliveryCharges = Number(location.delivery_charges || location.deliveryCharges) || 0;
				refreshCartUi();
			}
		});

		async function loadData() {
			status.textContent = "Loading products...";

			try {
				// Load categories from local file
				const catResponse = await fetch("../admin/categories.json", { cache: "no-store" });
				if (!catResponse.ok) {
					throw new Error("Failed to load categories.json");
				}

				const catData = await catResponse.json();
				categories = Array.isArray(catData) ? catData : (catData.categories || []);

				// Load products from JSONBin with fallback to local file
				let itemData;
				try {
					const binResponse = await fetch(`${JSONBIN_CONFIG.baseUrl}/${JSONBIN_CONFIG.fixedBinId}/latest`, {
						headers: {
							"X-Master-Key": JSONBIN_CONFIG.masterKey,
							"X-Access-Key": JSONBIN_CONFIG.accessKey
						},
						cache: "no-store"
					});

					if (binResponse.ok) {
						const payload = await binResponse.json();
						const record = payload && Object.prototype.hasOwnProperty.call(payload, "record")
							? payload.record
							: [];
						itemData = Array.isArray(record) ? record : (record && record.items ? record.items : []);
					} else {
						throw new Error("JSONBin response not ok");
					}
				} catch {
					// Fallback to local items.json
					const localResponse = await fetch("../admin/items.json", { cache: "no-store" });
					if (!localResponse.ok) {
						throw new Error("Failed to load items from JSONBin and local fallback");
					}
					const localData = await localResponse.json();
					itemData = Array.isArray(localData) ? localData : (localData.items || []);
				}

				products = itemData;

				populateCategoryFilter();
				filterAndRender();
				refreshCartUi();
				status.textContent = "";
			} catch (error) {
				status.textContent = "Unable to load product data. Run with a local server and verify ../admin/categories.json and ../admin/items.json.";
				productsGrid.innerHTML = '<div class="empty">Data could not be loaded.</div>';
				countLabel.textContent = "0 items";
				refreshCartUi();
			}
		}

		categoryFilter.addEventListener("change", () => {
			populateSubcategoryFilter(categoryFilter.value);
			filterAndRender();
		});

		subcategoryFilter.addEventListener("change", filterAndRender);

		viewCartBtn.addEventListener("click", openCartModal);
		confirmOrderBtn.addEventListener("click", confirmOrder);
		closeCartBtn.addEventListener("click", closeCartModal);
		cartModal.addEventListener("click", (event) => {
			if (event.target === cartModal) {
				closeCartModal();
			}
		});
		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape" && cartModal.classList.contains("open")) {
				closeCartModal();
			}
		});

		loadLocations();
		loadData();
	</script>
</body>
</html>
